<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analysis — Northwood Capital</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e2e4ea;
    --text-muted: #8b8fa3;
    --accent: #5bb8a4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 24px 32px 0;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    padding: 6px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0 32px 0;
    flex-wrap: wrap;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .content-frame {
    flex: 1;
    border: none;
    width: 100%;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Step 1: <span>Data Analysis</span></h1>
  <p class="subtitle">Climate Data Collection &amp; Gap Assessment</p>
</div>

<div class="tabs">
  <a class="tab active" data-src="step1/deliverable-1-data-inventory.html">Data Inventory</a>
  <a class="tab" data-src="step1/deliverable-2-data-quality.html">Quality Assessment</a>
  <a class="tab" data-src="step1/deliverable-3-error-log.html">Error Log</a>
  <a class="tab" data-src="step1/deliverable-4-gap-analysis.html">Gap Analysis</a>
  <a class="tab" data-src="step1/deliverable-5-data-ask.html">Data Ask</a>
</div>

<iframe class="content-frame" id="content-frame" src="step1/deliverable-1-data-inventory.html"></iframe>

<script>
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('content-frame').src = tab.dataset.src;
    });
  });
</script>

</body>
</html>
