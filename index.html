<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northwood Capital Partners — Kith Consulting</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e2e4ea;
    --text-muted: #8b8fa3;
    --text-dim: #5a5e72;
    --accent: #5bb8a4;
    --accent-dim: rgba(91,184,164,0.12);
    --green: #4caf50;
    --yellow: #e8a84c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .logo .slash { color: var(--text-dim); margin: 0 3px; }
  .logo .client { color: #fff; }
  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  .nav-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 8px 8px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.15s;
    margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
  .nav-item .status {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .status-complete { background: var(--green); }
  .status-active { background: var(--yellow); }
  .status-future { background: var(--border); }

  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── MAIN CONTENT ── */
  .main-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: 100vh;
  }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">KITH <span class="slash">/</span> <span class="client">NORTHWOOD</span></div>
    <div class="logo-sub">Climate Data &amp; Strategy</div>
  </div>

  <nav class="sidebar-nav">
    <!-- ENGAGEMENT -->
    <div class="nav-section">
      <div class="nav-section-label">Engagement</div>
      <a class="nav-item active" data-src="proposal.html">Proposal</a>
    </div>

    <!-- DELIVERABLES -->
    <div class="nav-section">
      <div class="nav-section-label">Deliverables</div>
      <a class="nav-item" data-src="data-analysis.html">
        Data Analysis
        <span class="status status-complete"></span>
      </a>
      <a class="nav-item" data-src="esg-scorecard.html">
        ESG Scorecard
        <span class="status status-active"></span>
      </a>
      <a class="nav-item" data-src="carbon-inventory.html">
        Carbon Inventory
        <span class="status status-active"></span>
      </a>
      <a class="nav-item" data-src="decarbonization.html">
        Decarbonization
        <span class="status status-active"></span>
      </a>
    </div>

    <!-- REFERENCE -->
    <div class="nav-section">
      <div class="nav-section-label">Reference</div>
      <a class="nav-item" data-src="portco-financials.html">
        Portco Financials
        <span class="status status-complete"></span>
      </a>
      <a class="nav-item" data-src="step1/data-pond.html">
        Data Pond
        <span class="status status-complete"></span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">Kith Consulting &bull; March 2026</div>
</aside>

<!-- ═══ MAIN CONTENT (iframe) ═══ -->
<iframe class="main-frame" id="main-frame" src="proposal.html"></iframe>

<!-- ═══ SCRIPTS ═══ -->
<script>
  document.querySelectorAll('.nav-item[data-src]').forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      // Update active state
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      // Load page in iframe
      document.getElementById('main-frame').src = item.dataset.src;
    });
  });
</script>

</body>
</html>
