<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <style>
      .name { font-family: Georgia, 'Times New Roman', serif; fill: #1A2744; }
      .sub { font-family: Georgia, 'Times New Roman', serif; fill: #3D5A80; }
    </style>
  </defs>
  <!-- Ridge mark -->
  <polygon points="20,70 38,28 48,48 62,18 76,70" fill="none" stroke="#1A2744" stroke-width="3" stroke-linejoin="miter"/>
  <line x1="62" y1="18" x2="62" y2="70" stroke="#A67C52" stroke-width="1.5" opacity="0.6"/>
  <!-- NORTHWOOD -->
  <text x="92" y="52" class="name" font-size="30" font-weight="bold" letter-spacing="4">NORTHWOOD</text>
  <!-- CAPITAL -->
  <text x="92" y="76" class="sub" font-size="14" font-weight="normal" letter-spacing="8">CAPITAL</text>
</svg>
